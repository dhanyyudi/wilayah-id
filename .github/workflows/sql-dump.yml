name: Generate SQL Dump

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    # Run monthly on 1st day at 00:00 UTC
    - cron: '0 0 1 * *'
  push:
    tags: [ 'data-v*' ]  # Trigger on data version tags

env:
  NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

jobs:
  generate-dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For creating releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Generate timestamp
        id: timestamp
        run: |
          echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Create SQL dump from Neon
        run: |
          echo "Creating database dump from Neon..."

          # Custom format — standardized name for /releases/latest/download/
          pg_dump "${NEON_DATABASE_URL}" \
            --format=custom \
            --compress=9 \
            --verbose \
            --file=wilayah_id.dump

          # Plain SQL format
          pg_dump "${NEON_DATABASE_URL}" \
            --format=plain \
            --compress=9 \
            --file=wilayah_id.sql.gz

          # Show file sizes
          ls -lh wilayah_id.dump wilayah_id.sql.gz

      - name: Calculate checksums
        run: |
          sha256sum wilayah_id.dump > checksums.txt
          sha256sum wilayah_id.sql.gz >> checksums.txt
          cat checksums.txt

      - name: Upload to GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: data-${{ steps.timestamp.outputs.timestamp }}
          name: "Database Dump — ${{ steps.timestamp.outputs.date }}"
          files: |
            wilayah_id.dump
            wilayah_id.sql.gz
            checksums.txt
          body: |
            ## Database Dump

            Automated database dump from Neon PostgreSQL.

            **Generated:** ${{ steps.timestamp.outputs.date }}
            **Source:** Neon PostgreSQL (id-restapi, ap-southeast-1)

            ### Files
            - `wilayah_id.dump` — Custom format, compressed (recommended, fastest restore)
            - `wilayah_id.sql.gz` — Plain SQL, compressed (human readable)
            - `checksums.txt` — SHA256 checksums

            ### Restore
            ```bash
            # Custom format (recommended)
            pg_restore -d wilayah_id -j 4 wilayah_id.dump

            # Plain SQL
            gunzip -c wilayah_id.sql.gz | psql -d wilayah_id
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (for scheduled runs without release)
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: sql-dump-${{ steps.timestamp.outputs.timestamp }}
          path: |
            wilayah_id.dump
            wilayah_id.sql.gz
          retention-days: 7
